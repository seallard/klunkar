<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 180" width="800" height="180" role="img" aria-label="klunkar — top wines from Systembolaget, straight to Telegram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5a1a1f"/>
      <stop offset="100%" stop-color="#2a0c10"/>
    </linearGradient>
    <linearGradient id="wine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8a242b"/>
      <stop offset="100%" stop-color="#3a0a0e"/>
    </linearGradient>
  </defs>

  <rect width="800" height="180" fill="url(#bg)" rx="16"/>

  <!-- Wine glass -->
  <g transform="translate(90, 28)">
    <!-- Bowl shell -->
    <path d="M 0 0 Q 0 68 38 82 Q 76 68 76 0 Z" fill="#f5e6c8" opacity="0.95"/>
    <!-- Wine fill -->
    <path d="M 5 12 Q 5 62 38 75 Q 71 62 71 12 Z" fill="url(#wine)"/>
    <!-- Stem -->
    <rect x="35" y="82" width="6" height="34" fill="#f5e6c8"/>
    <!-- Base -->
    <ellipse cx="38" cy="120" rx="26" ry="4.5" fill="#f5e6c8"/>
  </g>

  <!-- Wordmark -->
  <text x="210" y="98" font-family="Georgia, 'Times New Roman', serif" font-size="78" font-weight="700" fill="#f5e6c8" letter-spacing="1">klunkar</text>

  <!-- Tagline -->
  <text x="212" y="132" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="17" fill="#e8d5b7" opacity="0.85">Top wines from Systembolaget — straight to Telegram</text>
</svg>
